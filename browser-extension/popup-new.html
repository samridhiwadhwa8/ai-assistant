<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScreenAI Extension</title>
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            margin: 0;
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ef4565, #dc2626);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo svg {
            width: 24px;
            height: 24px;
        }
        
        h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }
        
        .description {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ef4565, #dc2626);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(239, 69, 101, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
        }
        
        .version {
            margin-top: 16px;
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div>
            <h1>ScreenAI</h1>
        </div>
    </div>
    
    <p class="description">
        AI-powered screen analysis assistant that floats on any webpage
    </p>
    
    <div class="actions">
        <button class="btn btn-primary" id="toggleChatbot">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M21 15C21 15.6 20.6 16 20 16H8L3 21V4C3 3.4 3.4 3 4 3H20C20.6 3 21 3.4 21 4V15Z" stroke="currentColor" stroke-width="2"/>
                <line x1="8" y1="8" x2="16" y2="8" stroke="currentColor" stroke-width="2"/>
                <line x1="8" y1="12" x2="14" y2="12" stroke="currentColor" stroke-width="2"/>
            </svg>
            Toggle Chatbot
        </button>
        
        <button class="btn btn-secondary" id="openWebApp">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M18 13V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h6" stroke="currentColor" stroke-width="2"/>
                <polyline points="15,3 21,3 21,9" stroke="currentColor" stroke-width="2"/>
                <line x1="10" y1="14" x2="21" y2="3" stroke="currentColor" stroke-width="2"/>
            </svg>
            Open Web App
        </button>
    </div>
    
    <div id="currentPageInfo" style="margin: 16px 0; padding: 12px; background: rgba(255,255,255,0.1); border-radius: 8px;">
        <div style="font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 4px;">Current Page:</div>
        <div id="pageTitle" style="font-weight: 600; font-size: 14px; margin-bottom: 4px;">Loading...</div>
        <div id="pageUrl" style="font-size: 11px; color: rgba(255,255,255,0.6); word-break: break-all;">Loading...</div>
        <div id="pageStatus" style="font-size: 12px; margin-top: 8px; font-weight: 500;">Checking...</div>
    </div>
    
    <div class="status">
        <span class="status-dot"></span>
        <span id="statusText">Extension Active</span>
    </div>
    
    <div class="version">
        Version 1.0.0
    </div>
    
    <script src="popup-new.js"></script>
</body>
</html>
